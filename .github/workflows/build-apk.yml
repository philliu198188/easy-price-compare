name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --debug --verbose 2>&1 | tail -200
          echo "=== Build APK listing ==="
          find build/app/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: easy-price-apk
          path: build/app/outputs/flutter-apk/app-debug.apk